<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Malli! 🎂</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdfcf0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Floating Balloons & Cake */
        .float {
            position: absolute;
            font-size: 2.5rem;
            animation: floatUp 6s infinite ease-in-out;
            opacity: 0.6;
            z-index: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        #content {
            position: relative;
            z-index: 10;
            width: 90%;
        }

        /* Birthday Wish Text */
        h1 {
            color: #ff4757;
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: none;
            text-shadow: 2px 2px #fff;
            line-height: 1.2;
        }

        /* Big Surprise Button */
        #mainBtn {
            padding: 25px 50px;
            font-size: 1.8rem;
            background: #00d2d3;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            font-weight: bold;
        }

        #photoContainer {
            display: none;
            margin-top: 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #photoContainer img {
            width: 100%;
            max-width: 500px;
            border-radius: 25px;
            border: 10px solid white;
            box-shadow: 0 20px 45px rgba(0,0,0,0.3);
        }

        /* Photo ekata yatin ena text eka */
        .funny-text {
            font-size: 2rem; /* Size ek loku kala */
            font-weight: bold;
            color: #333;
            margin-top: 20px;
        }

        /* Footer eka yata */
        footer {
            position: fixed;
            bottom: 20px;
            color: #ff4757;
            font-size: 1.8rem;
            font-weight: bold;
            width: 100%;
            text-align: center;
            z-index: 20;
            text-shadow: 1px 1px #fff;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="float" style="left: 10%; animation-delay: 0s;">🎈</div>
    <div class="float" style="left: 30%; animation-delay: 2s;">🎁</div>
    <div class="float" style="left: 70%; animation-delay: 1s;">🎂</div>
    <div class="float" style="left: 90%; animation-delay: 4s;">✨</div>

    <div id="content">
        <h1 id="wishText">HAPPY BIRTHDAY BRO! 🎂🎉</h1>
        
        <div id="photoContainer">
            <img src="cathamalli.jpg" alt="Malli">
            <p class="funny-text">Happy Birthday kaluu</p>
        </div>

        <br>
        <button id="mainBtn" onclick="nextStep()">SURPRISE!</button>
    </div>


    <script>
        let step = 0;
        function nextStep() {
            step++;
            const btn = document.getElementById('mainBtn');
            const wish = document.getElementById('wishText');
            const photo = document.getElementById('photoContainer');

            if (step === 1) {
                wish.style.display = 'block';
                btn.innerText = 'SEE MY REAL PHOTO?';
            } else if (step === 2) {
                wish.style.display = 'none';
                photo.style.display = 'block';
                btn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
